name: Post-Merge Distribution Integrity

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Validate firmware distribution integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1
      - name: Validate exact-main-SHA metadata and published firmware checksums
        env:
          MAIN_SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
        run: |
          python - <<'PY'
          from hashlib import sha256
          import json
          import os
          from pathlib import Path

          metadata_path = Path("PLATFORM_RELEASE_DRY_RUN_3_3.json")
          metadata = json.loads(metadata_path.read_text(encoding="utf-8"))
          assert metadata["schema_version"] == 1
          assert metadata["kind"] == "platform_release_distribution_dry_run"
          assert metadata["platform_version"] == "3.3"
          assert metadata["repository_version"].startswith("3.3.")
          assert metadata["release_mode"] == "dry_run"
          assert metadata["artifact_state"] == "planned_not_published"
          assert metadata["publication"] == "forbidden"

          manifest_path = Path("firmware_manifest.json")
          manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
          assert manifest["firmwares"]
          for firmware in manifest["firmwares"]:
              asset = Path(firmware["asset"])
              checksum = Path(f"{asset}.sha256")
              assert asset.is_file(), asset
              assert checksum.is_file(), checksum
              actual = sha256(asset.read_bytes()).hexdigest()
              declared = firmware["sha256"]
              sidecar = checksum.read_text(encoding="utf-8").split()[0]
              assert actual == declared, asset
              assert sidecar == declared, checksum
              assert asset.stat().st_size == firmware["size"], asset
          evidence = {
              "schema_version": 1,
              "kind": "platform_release_distribution_integrity",
              "repository": os.environ["REPOSITORY"],
              "main_sha": os.environ["MAIN_SHA"],
              "metadata": str(metadata_path),
              "metadata_sha256": sha256(metadata_path.read_bytes()).hexdigest(),
              "firmware_manifest_sha256": sha256(manifest_path.read_bytes()).hexdigest(),
              "artifact_state": metadata["artifact_state"],
              "publication": metadata["publication"],
              "status": "PASS",
          }
          Path("platform-release-distribution-integrity.json").write_text(json.dumps(evidence, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: platform-release-distribution-integrity
          path: platform-release-distribution-integrity.json
          if-no-files-found: error
